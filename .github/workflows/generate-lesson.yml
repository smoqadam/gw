name: Generate Weekly Lesson

on:
  workflow_dispatch:
    inputs:
      level:
        description: CEFR level (A1-C2)
        required: false
        default: B1
      topic:
        description: "Free-form topic (overrides the queue). Leave empty to pop the next entry from topics-queue.txt."
        required: false
      source:
        description: "Optional source URL (e.g. a Wikipedia article). If set, the topic field becomes a steering hint."
        required: false
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve level + topic + source
        id: pick
        run: |
          LEVEL="${{ github.event.inputs.level }}"
          [ -z "$LEVEL" ] && LEVEL="B1"

          TOPIC="${{ github.event.inputs.topic }}"
          SOURCE="${{ github.event.inputs.source }}"

          QUEUE_POPPED="false"
          if [ -z "$TOPIC" ] && [ -z "$SOURCE" ]; then
            if [ ! -s topics-queue.txt ]; then
              echo "::error::topics-queue.txt is empty or missing. Add at least one topic line and rerun."
              exit 1
            fi
            TOPIC="$(head -n 1 topics-queue.txt)"
            tail -n +2 topics-queue.txt > topics-queue.txt.new
            mv topics-queue.txt.new topics-queue.txt
            QUEUE_POPPED="true"
            echo "Popped from queue: $TOPIC"
          fi

          {
            echo "LEVEL=$LEVEL"
            echo "TOPIC<<EOF"
            echo "$TOPIC"
            echo "EOF"
            echo "SOURCE=$SOURCE"
            echo "QUEUE_POPPED=$QUEUE_POPPED"
          } >> "$GITHUB_ENV"

      - name: Generate lesson
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          ARGS=(--level "$LEVEL")
          if [ -n "$SOURCE" ]; then ARGS+=(--source "$SOURCE"); fi
          if [ -n "$TOPIC" ]; then ARGS+=(--topic "$TOPIC"); fi
          echo "Running: python germanweekly.py ${ARGS[*]}"
          python germanweekly.py "${ARGS[@]}"

      - name: Commit and push lesson
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/latest.json lessons/latest.mp3 lessons/archive || true
          if [ "$QUEUE_POPPED" = "true" ]; then
            git add topics-queue.txt
          fi
          if git diff --cached --quiet; then
            echo "No lesson changes to commit"
            exit 0
          fi
          git commit -m "chore: update weekly german lesson"
          git push
