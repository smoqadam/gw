name: Generate Lesson

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube URL. If set, builds a VIDEO lesson (captions, else local transcription) instead of a text lesson."
        required: false
      level:
        description: CEFR level (A1-C2)
        required: false
        default: B1
      topic:
        description: "Text lesson: free-form topic (overrides the queue). Leave empty to pop the next entry from topics-queue.txt."
        required: false
      source:
        description: "Text lesson: optional source URL (e.g. a Wikipedia article). If set, the topic field becomes a steering hint."
        required: false
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write

jobs:
  text:
    # Runs for the weekly schedule and for manual runs without a YouTube URL.
    if: ${{ github.event.inputs.youtube_url == '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve level + topic + source
        id: pick
        run: |
          LEVEL="${{ github.event.inputs.level }}"
          [ -z "$LEVEL" ] && LEVEL="B1"

          TOPIC="${{ github.event.inputs.topic }}"
          SOURCE="${{ github.event.inputs.source }}"

          QUEUE_POPPED="false"
          if [ -z "$TOPIC" ] && [ -z "$SOURCE" ]; then
            if [ ! -s topics-queue.txt ]; then
              echo "::error::topics-queue.txt is empty or missing. Add at least one topic line and rerun."
              exit 1
            fi
            TOPIC="$(head -n 1 topics-queue.txt)"
            tail -n +2 topics-queue.txt > topics-queue.txt.new
            mv topics-queue.txt.new topics-queue.txt
            QUEUE_POPPED="true"
            echo "Popped from queue: $TOPIC"
          fi

          {
            echo "LEVEL=$LEVEL"
            echo "TOPIC<<EOF"
            echo "$TOPIC"
            echo "EOF"
            echo "SOURCE=$SOURCE"
            echo "QUEUE_POPPED=$QUEUE_POPPED"
          } >> "$GITHUB_ENV"

      - name: Generate lesson
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          ARGS=(--level "$LEVEL")
          if [ -n "$SOURCE" ]; then ARGS+=(--source "$SOURCE"); fi
          if [ -n "$TOPIC" ]; then ARGS+=(--topic "$TOPIC"); fi
          echo "Running: python germanweekly.py ${ARGS[*]}"
          python germanweekly.py "${ARGS[@]}"

      - name: Commit and push lesson
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A lessons
          if [ "$QUEUE_POPPED" = "true" ]; then
            git add topics-queue.txt
          fi
          if git diff --cached --quiet; then
            echo "No lesson changes to commit"
            exit 0
          fi
          git commit -m "chore: update weekly german lesson"
          git push

  video:
    # Runs only for a manual run with a YouTube URL.
    if: ${{ github.event.inputs.youtube_url != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install video dependencies
        run: pip install -r requirements-video.txt

      - name: Cache German Kroko model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: kroko-de
          key: kroko-de-2025-08-06

      - name: Download German Kroko model (used only when a video has no captions)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p kroko-de
          base="https://huggingface.co/csukuangfj/sherpa-onnx-streaming-zipformer-de-kroko-2025-08-06/resolve/main"
          for f in encoder.onnx decoder.onnx joiner.onnx tokens.txt; do
            curl -fSL "$base/$f" -o "kroko-de/$f"
          done

      - name: Generate video lesson
        env:
          KROKO_MODEL: ${{ github.workspace }}/kroko-de
        run: |
          LEVEL="${{ github.event.inputs.level }}"
          [ -z "$LEVEL" ] && LEVEL="B1"
          python germanweekly.py --youtube "${{ github.event.inputs.youtube_url }}" --level "$LEVEL"

      - name: Commit and push lesson
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A lessons
          if git diff --cached --quiet; then
            echo "No lesson changes to commit"
            exit 0
          fi
          git commit -m "chore: add youtube video lesson"
          git push
