<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deck — German Weekly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nav">
      <a href="./" class="brand">German<span class="sep">·</span>Weekly</a>
      <div class="nav-links">
        <a href="deck.html" class="active">Deck</a>
      </div>
    </nav>

    <main>
      <div class="deck-head">
        <h1 class="title">Your deck</h1>
        <span class="eyebrow" id="deck-meta"></span>
      </div>
      <div id="deck-body"></div>

      <p class="audience-hint">
        Saved while reading a lesson. Click any word in a lesson, then “Save to deck”.
      </p>
    </main>

    <script src="deck.js"></script>
    <script>
      function el(tag, opts = {}, ...children) {
        const node = document.createElement(tag);
        if (opts.class) node.className = opts.class;
        if (opts.text != null) node.textContent = opts.text;
        if (opts.attrs) for (const [k, v] of Object.entries(opts.attrs)) node.setAttribute(k, v);
        for (const c of children) if (c) node.appendChild(c);
        return node;
      }

      function render() {
        const body = document.getElementById("deck-body");
        const meta = document.getElementById("deck-meta");
        const cards = Deck.all();
        body.textContent = "";
        meta.textContent = cards.length ? `${cards.length} word${cards.length === 1 ? "" : "s"}` : "";

        if (!cards.length) {
          body.appendChild(el("div", { class: "deck-empty", text: "No saved words yet." }));
          return;
        }

        const list = el("div", { class: "deck-list" });
        for (const card of cards) {
          const item = el("div", { class: "deck-card" });
          const main = el("div", { class: "deck-card-main" });

          const term = el("div", { class: "term" });
          if (card.article) term.appendChild(el("span", { class: "article", text: card.article }));
          term.appendChild(document.createTextNode(card.term));
          main.appendChild(term);

          if (card.definition) main.appendChild(el("div", { class: "def", text: card.definition }));
          if (card.example) main.appendChild(el("div", { class: "ex", text: "„" + card.example + "”" }));
          if (card.source) main.appendChild(el("div", { class: "src", text: card.source }));
          item.appendChild(main);

          const remove = el("button", { class: "deck-remove", text: "✕", attrs: { "aria-label": "Remove", title: "Remove" } });
          remove.type = "button";
          remove.addEventListener("click", () => {
            Deck.remove(card.term);
            render();
          });
          item.appendChild(remove);

          list.appendChild(item);
        }
        body.appendChild(list);
      }

      render();
    </script>
  </body>
</html>
