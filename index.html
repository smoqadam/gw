<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>German Weekly</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: #f6f7fb;
        color: #1a1d2b;
      }
      main {
        max-width: 860px;
        margin: 32px auto;
        padding: 0 16px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
      }
      h1 { margin-top: 0; }
      .meta { color: #5c6380; font-size: 14px; margin-bottom: 16px; }
      .text {
        white-space: pre-wrap;
        line-height: 1.7;
        margin: 20px 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid #e6e8f0;
      }
      .error { color: #b42318; }
      audio { width: 100%; margin: 12px 0 20px; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1 id="title">German Weekly</h1>
        <div id="meta" class="meta">Loading latest lesson...</div>
        <audio id="audio" controls hidden></audio>
        <div id="text" class="text"></div>
        <h2>Vocabulary</h2>
        <table>
          <thead>
            <tr><th>Word</th><th>Definition</th></tr>
          </thead>
          <tbody id="vocabs"></tbody>
        </table>
      </div>
    </main>

    <script>
      async function loadLesson() {
        const title = document.getElementById("title");
        const meta = document.getElementById("meta");
        const text = document.getElementById("text");
        const audio = document.getElementById("audio");
        const vocabs = document.getElementById("vocabs");

        try {
          const response = await fetch("lessons/latest.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error("No lesson found yet.");
          }

          const lesson = await response.json();
          title.textContent = lesson.title || "German Weekly";

          const date = lesson.date ? new Date(lesson.date).toLocaleDateString() : "";
          const category = lesson.category ? ` • ${lesson.category}` : "";
          meta.textContent = `${date}${category}`.trim();

          text.textContent = lesson.text || "";

          if (lesson.voice_path) {
            audio.src = lesson.voice_path;
            audio.hidden = false;
          }

          vocabs.innerHTML = "";
          for (const item of lesson.vocabs || []) {
            const row = document.createElement("tr");
            const wordCell = document.createElement("td");
            wordCell.textContent = item.word || "";
            const defCell = document.createElement("td");
            defCell.textContent = item.definition || "";
            row.appendChild(wordCell);
            row.appendChild(defCell);
            vocabs.appendChild(row);
          }
        } catch (error) {
          meta.innerHTML = `<span class="error">${error.message}</span>`;
          text.textContent = "Run the generator workflow to create the first lesson.";
        }
      }

      loadLesson();
    </script>
  </body>
</html>
